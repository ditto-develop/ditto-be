name: ✈️ DITTO BE ACTION

on:
  push:
    branches:
      - main   # main 브랜치에 push 될 때마다 실행

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: ✈️Ditto Action
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            echo ">>> Move to project directory"
            cd /home/ubuntu/ditto-be || { echo "Directory not found, cloning..."; git clone git@github.com-ditto-be:Ditto-devHQ/ditto-be.git /home/ubuntu/ditto-be && cd /home/ubuntu/ditto-be; }
            
            echo ">>> Git fetch & reset to origin/main"
            git remote set-url origin git@github.com-ditto-be:Ditto-devHQ/ditto-be.git
            git fetch origin main
            git reset --hard origin/main

            echo ">>> Build BE docker image"
            sudo docker build -t ditto-be:latest .

            echo ">>> Docker compose restart api"
            cd /home/ubuntu/ditto
            sudo docker-compose up -d api

            echo ">>> Remove unused docker images"
            sudo docker image prune -f
